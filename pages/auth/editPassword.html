<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Changement mot de passe</h1>
    </div>
  </div>
  
  <div class="container">
    <form>
        <div class="mb-3">
          <label for="OldPasswordInput" class="form-label">Ancien mot de passe</label>
          <input type="password" class="form-control" id="OldPasswordInput" placeholder="Taper ici votre mot de passe actuel">
        </div>
        <div class="mb-3">
            <label for="NewPasswordInput" class="form-label">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="NewPasswordInput" placeholder="Taper ici votre nouveau mot de passe">
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Validez votre mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput" placeholder="Veuillez confirmer votre mot de passe">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Changer mon mot de passe</button>
        </div>
    </form>
    <div class="text-center pt-3">
        <a href="/account">Modifier mes informations personnelles</a>
    </div>
  </div>
